# HGX B300 PoC 모니터링 스택 (최대 수집 모드)
# Docker Compose로 Prometheus + Exporters 실행

version: '3.8'

services:
  # ============================================================
  # Prometheus - 메트릭 수집/저장 서버
  # ============================================================
  prometheus:
    image: prom/prometheus:v3.4.0
    pull_policy: never
    container_name: prometheus
    user: "root"
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/monitoring/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /opt/monitoring/prometheus-data:/prometheus
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-admin-api'
      - '--web.enable-lifecycle'

  # ============================================================
  # DCGM Exporter - GPU 메트릭 (최대 수집 모드)
  # 커스텀 CSV로 DCP 프로파일링 + NVLink + ECC 등 전체 수집
  # ============================================================
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    pull_policy: never
    container_name: dcgm-exporter
    hostname: hgx-node1
    restart: unless-stopped
    ports:
      - "9400:9400"
    volumes:
      - /opt/monitoring/config/custom-dcgm-counters.csv:/etc/dcgm-exporter/customized.csv:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DCGM_EXPORTER_COLLECTORS=/etc/dcgm-exporter/customized.csv
      - TZ=Asia/Seoul
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    privileged: true
    networks:
      - monitoring

  # ============================================================
  # IPMI Exporter - 서버 하드웨어 메트릭 (전체 collector 활성화)
  # ipmi + dcmi + bmc + chassis + sel 모든 collector 수집
  # ============================================================
  ipmi-exporter:
    image: prometheuscommunity/ipmi-exporter:latest
    pull_policy: never
    container_name: ipmi-exporter
    hostname: hgx-node1
    user: "root"
    restart: unless-stopped
    ports:
      - "9290:9290"
    volumes:
      - /opt/monitoring/config/ipmi-exporter-config.yml:/etc/ipmi-exporter/config.yml:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
    command:
      - '--config.file=/etc/ipmi-exporter/config.yml'
      - '--freeipmi.path=/usr/sbin'
    privileged: true
    devices:
      - /dev/ipmi0:/dev/ipmi0
    networks:
      - monitoring

  # ============================================================
  # Node Exporter - OS 메트릭 (추가 collector 활성화)
  # 기본 collector + perf + processes + systemd 등 추가
  # ============================================================
  node-exporter:
    image: prom/node-exporter:latest
    pull_policy: never
    container_name: node-exporter
    hostname: hgx-node1
    user: "root"
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /var/run/dbus/system_bus_socket:/var/run/dbus/system_bus_socket:ro
      - /run/udev:/run/udev:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      # === 추가 활성화 collector ===
      # - '--collector.systemd'            # systemd 서비스 상태 (성능 저하 및 Scrape Timeout 방지 위해 비활성화)
      # - '--collector.interrupts'         # 인터럽트 카운터 (고코어 EPYC/Xeon 환경에서 오버헤드 방지 위해 비활성화)
      - '--collector.tcpstat'            # TCP 연결 상태
      - '--collector.buddyinfo'          # 메모리 조각화
      - '--collector.meminfo_numa'       # NUMA 노드별 메모리
      - '--no-collector.mdadm'           # mdadm RAID 수집 제외 (strconv.ParseUint 파싱 에러 방지)
      # infiniband collector는 기본 활성화됨
    pid: host
    privileged: true
    networks:
      - monitoring

  # ============================================================
  # Grafana - 메트릭 시각화
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    pull_policy: never
    container_name: grafana
    user: "root"
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/monitoring/config/grafana-datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - /opt/monitoring/grafana-data:/var/lib/grafana
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
      - GF_SECURITY_ADMIN_PASSWORD=admin

networks:
  monitoring:
    driver: bridge
