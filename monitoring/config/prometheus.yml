# Prometheus 설정 파일
# HGX B300 PoC 모니터링용

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ============================================================
  # Prometheus 자체 메트릭
  # ============================================================
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ============================================================
  # Node Exporter (서버 OS 메트릭: CPU, 메모리, 디스크, 네트워크)
  # ============================================================
  - job_name: "node-exporter"
    scrape_interval: 15s   # IPMI는 30초 간격
    scrape_timeout: 14s
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          instance: "hgx-node1"
      - targets: ["hgx-node2:9100"]
        labels:
          instance: "hgx-node2"

  # ============================================================
  # DCGM Exporter (GPU 메트릭: 온도, 전력, 사용률, ECC, NVLink)
  # B300 8-GPU × 53개 프로파일링 카운터 → 응답 5~15초 소요
  # scrape_timeout은 반드시 scrape_interval 이하여야 함
  # ============================================================
  - job_name: "dcgm-exporter"
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets: ["localhost:9400"]
        labels:
          instance: "hgx-node1"
      - targets: ["hgx-node2:9400"]
        labels:
          instance: "hgx-node2"

  # ============================================================
  # IPMI Exporter (서버 하드웨어: CPU 온도, 팬, PSU, 이벤트 로그)
  # BMC 5개 collector (ipmi/dcmi/bmc/chassis/sel) 순차질의 → 15~25초 소요
  # ============================================================
  - job_name: "ipmi-exporter"
    scrape_interval: 30s
    scrape_timeout: 25s
    metrics_path: "/ipmi"
    params:
      module: ["default"]
    static_configs:
      - targets: ["localhost:9290"]
        labels:
          instance: "hgx-node1"
      - targets: ["hgx-node2:9290"]
        labels:
          instance: "hgx-node2"
    relabel_configs:
      - target_label: __param_target
        replacement: "127.0.0.1"


